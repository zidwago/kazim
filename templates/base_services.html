<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_title }}</title>
  <link rel="stylesheet" href="{{ base_path }}/static/css/style.css">
  <script>
    (function(){
      var t = localStorage.getItem('kazim-theme') ||
              (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <div class="site-container">
    <header class="site-header">
      <div class="site-header__inner">
        <a href="{{ base_path }}/" class="site-title">Kazim Sherazee</a>
        <nav class="site-nav">
          <a href="{{ base_path }}/projects/">projects</a>
          <a href="{{ base_path }}/about/">about</a>
        </nav>
      </div>
    </header>

    <button class="theme-toggle" id="theme-toggle">dark mode</button>

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <span>&copy; {{ year }} Kazim Sherazee.</span>
      <span><a href="mailto:kazimsherazee@gmail.com">kazimsherazee@gmail.com</a></span>
    </footer>
  </div>

  <script src="{{ base_path }}/static/js/main.js"></script>
</body>
</html>
